<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Login</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{

    display:flex;
    justify-content:center;
    align-items:center;

    min-height:100vh;

    background:linear-gradient(
        135deg,
        #0f172a,
        #312e81,
        #7c3aed
    );

}

.login-box{

    background:white;

    width:100%;
    max-width:400px;

    padding:35px;

    border-radius:20px;

    box-shadow:
    0 15px 40px rgba(0,0,0,.25);

}

.login-box h2{

    text-align:center;

    margin-bottom:25px;

    color:#312e81;

}

.input-group{

    margin-bottom:15px;

}

.input-group label{

    display:block;

    margin-bottom:6px;

    font-weight:600;

    color:#333;

}

.input-group input{

    width:100%;

    padding:12px;

    border:1px solid #ccc;

    border-radius:10px;

    font-size:15px;

}

.input-group input:focus{

    outline:none;

    border-color:#7c3aed;

}

button{

    width:100%;

    padding:14px;

    border:none;

    border-radius:10px;

    background:#7c3aed;

    color:white;

    font-size:16px;

    font-weight:bold;

    cursor:pointer;

    transition:.3s;

}

button:hover{

    background:#5b21b6;

}

#status{

    text-align:center;

    margin-top:15px;

    color:#dc2626;

    font-size:14px;

}

</style>

</head>

<body>

<div class="login-box">

    <h2>
        🔐 Admin Login
    </h2>

    <form id="loginForm">

        <div class="input-group">

            <label>
                Email
            </label>

            <input
                type="email"
                id="username"
                placeholder="Enter admin email"
                required
            >

        </div>

        <div class="input-group">

            <label>
                Password
            </label>

            <input
                type="password"
                id="password"
                placeholder="Enter password"
                required
            >

        </div>

        <button type="submit">
            Login
        </button>

    </form>

    <p id="status"></p>

</div>

<script type="module" src="login.js"></script>

</body>
</html>
